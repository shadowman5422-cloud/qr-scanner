<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>স্মার্ট QR ও বারকোড স্ক্যানার</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 15px; max-width: 650px; margin: auto; background: #f5f5f5; }
    h2 { color: #2c3e50; }
    table { border-collapse: collapse; width: 100%; background: white; box-shadow: 0 0 5px rgba(0,0,0,0.1); margin: 15px 0; font-size: 14px; overflow-x: auto; display: block; }
    th { background: #3498db; color: white; padding: 10px 6px; text-align: center; position: sticky; top: 0; }
    td { border: 1px solid #ddd; padding: 8px 6px; text-align: center; }
    .totals td { font-weight: bold; background: #ecf0f1; }
    button { padding: 12px 18px; margin: 4px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    #saveBtn { background: #27ae60; color: white; }
    #clearBtn { background: #e67e22; color: white; }
    #soundToggleBtn { background: #3498db; color: white; }
    #stopScanBtn { background: #000000; color: white; }
    #startScanBtn { background: #2ecc71; color: white; display: none; }
    .delete-btn { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 4px; font-size: 14px; border: none; }
    #reader { width: 100%; max-width: 350px; margin: 0 auto 20px; }
    #message { margin-top: 12px; font-weight: bold; text-align: center; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h2>📷 স্মার্ট QR & বারকোড স্ক্যানার</h2>
  <p>JSON, key=value এবং pipe(|) সেপারেটর সঠিকভাবে পার্স করে।</p>
  <div id="reader"></div>
  <div style="text-align:center; margin-top:10px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
    <button id="startScanBtn">▶️ স্ক্যান করুন</button>
    <button id="stopScanBtn" style="display:none;">🛑 স্ক্যান থামান</button>
    <button id="soundToggleBtn">🔊 স্ক্যান শব্দ: চালু</button>
  </div>

  <div style="overflow-x:auto;">
    <table id="productTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
      <tfoot id="tableFoot"></tfoot>
    </table>
  </div>

  <div style="text-align:center;">
    <button id="saveBtn">💾 Google Sheet-এ সংরক্ষণ</button>
    <button id="clearBtn">🗑️ সম্পূর্ণ তালিকা মুছুন</button>
  </div>
  <div id="message"></div>

  <script>
    // ⚙️ আপনার Google Apps Script ওয়েব অ্যাপ URL বসান
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBkDCM1RkJtjrCDPEAcdXu-PH6wlCf7ImN7UMffO96GzvXtF210V2YvGvRWVabmTOe/exec'; 

    let productList = []; 
    let lastScannedText = ''; 
    let isSoundOn = true;
    let isProcessing = false;

    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');
    const tableFoot = document.getElementById('tableFoot');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const messageDiv = document.getElementById('message');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const startScanBtn = document.getElementById('startScanBtn');

    soundToggleBtn.addEventListener('click', () => {
      isSoundOn = !isSoundOn;
      soundToggleBtn.textContent = isSoundOn ? '🔊 স্ক্যান শব্দ: চালু' : '🔇 স্ক্যান শব্দ: বন্ধ';
      soundToggleBtn.style.background = isSoundOn ? '#3498db' : '#7f8c8d';
    });

    function playBeep() {
      if (!isSoundOn) return;
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
      } catch(e) {}
    }

    try {
      const saved = localStorage.getItem('productList');
      if (saved) productList = JSON.parse(saved);
      renderTable();
    } catch(e) {}

    function renderTable() {
      const allKeys = new Set();
      productList.forEach(item => {
        Object.keys(item).forEach(key => allKeys.add(key));
      });
      
      const defaultHeaders = ['date', 'name', 'price', 'sku', 'currency'];
      const finalHeaders = Array.from(allKeys).filter(k => !defaultHeaders.includes(k));
      const headers = ['date', 'name', 'price', ...finalHeaders, 'delete'];

      tableHead.innerHTML = '';
      const headerRow = document.createElement('tr');
      headers.forEach(header => {
        const th = document.createElement('th');
        if(header === 'date') th.textContent = 'তারিখ';
        else if(header === 'delete') th.textContent = 'মুছুন';
        else if(header === 'name') th.textContent = 'পণ্যের নাম';
        else if(header === 'price') th.textContent = 'দাম';
        else th.textContent = header;
        headerRow.appendChild(th);
      });
      tableHead.appendChild(headerRow);

      tableBody.innerHTML = '';
      let totalItems = 0;
      let totalPrice = 0;

      productList.forEach((item, index) => {
        const tr = document.createElement('tr');
        totalItems++; // প্রতিটি সারি = ১টি পণ্য

        headers.forEach(header => {
          const td = document.createElement('td');
          if (header === 'delete') {
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '✕';
            delBtn.onclick = () => {
              if (confirm('আইটেমটি মুছে ফেলবেন?')) {
                productList.splice(index, 1);
                renderTable();
              }
            };
            td.appendChild(delBtn);
          } else {
            let val = item[header] || '';
            if (header === 'price') {
              let priceNum = parseFloat(val) || 0;
              totalPrice += priceNum;
              val = priceNum > 0 ? priceNum + ' টাকা' : '0';
            }
            td.textContent = val;
          }
          tr.appendChild(td);
        });
        tableBody.appendChild(tr);
      });

      // মোট পণ্য তারিখ কলামের নিচে, মোট দাম দাম কলামের নিচে
      tableFoot.innerHTML = '';
      const footerRow = document.createElement('tr');
      footerRow.className = 'totals';
      footerRow.innerHTML = `
        <td style="font-weight:bold;">মোট পণ্য:</td>
        <td style="font-weight:bold; text-align:center;">${totalItems}</td>
        <td style="font-weight:bold; text-align:center;">${totalPrice > 0 ? totalPrice + ' টাকা' : '0 টাকা'}</td>
        <td></td>
        <td></td>
      `;
      tableFoot.appendChild(footerRow);
      localStorage.setItem('productList', JSON.stringify(productList));
    }

    // ✅ সঠিক পার্সিং লজিক
    function processQRData(qrString) {
      if (isProcessing) return;

      const trimmedString = qrString.trim();

      if (lastScannedText === trimmedString) {
        if (!confirm('⚠️ এই পণ্যটি ইতিমধ্যে স্ক্যান করা হয়েছে। কি আরেকটি নতুন কপি হিসেবে যুক্ত করতে চান?')) {
          return; 
        }
      }

      isProcessing = true;
      lastScannedText = trimmedString;
      playBeep();

      const today = new Date().toLocaleDateString('bn-BD', { year: 'numeric', month: '2-digit', day: '2-digit' });
      const item = { date: today };
      
      // ১. JSON ফরম্যাট চেক
      try {
        const jsonData = JSON.parse(trimmedString);
        for (const [key, value] of Object.entries(jsonData)) {
           item[key] = value;
        }
        productList.push(item);
        renderTable();
        messageDiv.textContent = `✅ ${item.name || item['পণ্যের নাম'] || 'পণ্য'} স্ক্যান সফল`;
        messageDiv.className = 'success';
        if (navigator.vibrate) navigator.vibrate(200);
        setTimeout(() => { isProcessing = false; }, 500);
        return;
      } catch (e) {}

      // ২. Key=Value ফরম্যাট চেক
      const parts = trimmedString.split('|');
      let foundKeysEq = false;
      let tempItem = {};
      
      parts.forEach(part => {
        if (part.includes('=')) {
          const kv = part.split('=');
          if (kv.length === 2) {
            tempItem[kv[0].trim()] = kv[1].trim();
            foundKeysEq = true;
          }
        }
      });

      // ৩. যদি Key=Value পাওয়া যায়, সেটা আইটেমে যোগ
      if (foundKeysEq) {
        for (const [key, value] of Object.entries(tempItem)) {
            item[key] = value;
        }
      } 
      else {
        // ৪. সাধারণ বারকোড বা পাইপ(|) ফরম্যাট (SKU|Price|Name)
        if (parts.length >= 2) {
            item['sku'] = parts[0].trim();
            
            let tempPrice = parseFloat(parts[1].trim());
            if (!isNaN(tempPrice)) {
                item['price'] = tempPrice;
            } else {
                item['price'] = 0; 
            }

            if (parts.length >= 3) {
                item['name'] = parts[2].trim();
            } else {
                item['name'] = parts[1].trim();
            }
        } 
        else {
            // ৫. একদম সাধারণ টেক্সট (যদি কোনো সেপারেটর না থাকে)
            let namePart = trimmedString;
            let detectedPrice = 0;
            const priceMatch = namePart.match(/(?:দাম|price|টাকা|৳|Rs\.?)\s*(\d+)/i);
            if (priceMatch && priceMatch[1]) {
                detectedPrice = parseFloat(priceMatch[1]);
                namePart = namePart.replace(/(?:দাম|price|টাকা|৳|Rs\.?)\s*\d+\s*(?:টাকা)?/i, '').trim();
            }
            item['name'] = namePart || 'অজানা পণ্য';
            item['price'] = detectedPrice;
        }
      }

      productList.push(item);
      renderTable();
      messageDiv.textContent = `✅ ${item.name || item['পণ্যের নাম'] || 'পণ্য'} স্ক্যান সফল`;
      messageDiv.className = 'success';
      if (navigator.vibrate) navigator.vibrate(200);
      setTimeout(() => { isProcessing = false; }, 500);
    }

    const html5QrCode = new Html5Qrcode("reader");
    const formatsToSupport = [
      Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8, Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E, Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39, Html5QrcodeSupportedFormats.CODABAR,
      Html5QrcodeSupportedFormats.CODE_93, Html5QrcodeSupportedFormats.ITF
    ];
    const config = { fps: 5, qrbox: { width: 300, height: 100 }, formatsToSupport };

    function startScanner() {
      html5QrCode.start({ facingMode: "environment" }, config, 
        decodedText => processQRData(decodedText),
        err => {}
      ).then(() => {
        stopScanBtn.style.display = 'inline-block';
        startScanBtn.style.display = 'none';
      }).catch(err => alert('ক্যামেরা অনুমতি দিন'));
    }

    stopScanBtn.onclick = () => {
      html5QrCode.stop().then(() => {
        stopScanBtn.style.display = 'none';
        startScanBtn.style.display = 'inline-block';
      });
    };

    startScanBtn.onclick = () => {
      startScanner();
    };

    window.addEventListener('load', startScanner);

    // ✅ Google Sheet-এ সেভ (স্পেস ট্রিম করা লজিক) - আপনার দেওয়া কোড
    saveBtn.addEventListener('click', () => {
      if (productList.length === 0) return alert('তালিকা খালি');
      
      fetch(SCRIPT_URL, {
        method: 'POST', 
        body: JSON.stringify(productList), // পুরো তালিকা পাঠানো
        headers: { 'Content-Type': 'application/json' }
      })
      .then(response => response.text())
      .then(data => {
        // 🔥 ট্রিম করা হয়েছে (যেকোনো লুকানো স্পেস বা এন্টার সরিয়ে ফেলবে)
        if(data.trim() === "Success") {
           messageDiv.textContent = '✅ Google Sheet-এ জমা হয়েছে';
           messageDiv.className = 'success';
           productList = []; 
           renderTable();
        } else {
           messageDiv.textContent = '❌ সমস্যা: ' + data;
           messageDiv.className = 'error';
        }
      })
      .catch(err => {
        messageDiv.textContent = '❌ নেটওয়ার্ক সমস্যা';
        messageDiv.className = 'error';
      });
    });

    clearBtn.onclick = () => {
      if (confirm('সম্পূর্ণ তালিকা মুছবেন?')) {
        productList = []; renderTable();
        messageDiv.textContent = '';
      }
    };
  </script>
</body>
</html>
