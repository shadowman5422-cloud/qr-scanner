<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>স্মার্ট QR ও বারকোড স্ক্যানার</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 15px; max-width: 650px; margin: auto; background: #f5f5f5; }
    h2 { color: #2c3e50; }
    
    /* টেবিল র্যাপার */
    .table-wrapper { width: 100%; overflow-x: auto; margin: 15px 0; }
    
    /* টেবিলের সঠিক স্টাইল */
    #productTable { 
      display: table; 
      width: 100%; 
      border-collapse: collapse; 
      background: white; 
      box-shadow: 0 0 5px rgba(0,0,0,0.1); 
      font-size: 14px; 
    }
    
    th { background: #3498db; color: white; padding: 10px 6px; text-align: center; position: sticky; top: 0; }
    td { border: 1px solid #ddd; padding: 8px 6px; text-align: center; }
    td[contenteditable="true"]:focus { outline: 2px solid #3498db; background: #f0f8ff; }
    .totals td { font-weight: bold; background: #ecf0f1; }
    
    /* 🔥 বাধ্যতামূলক ফুটার ডিসপ্লে ফিক্স (এটাই ফুটার দেখানোর গ্যারান্টি) */
    tfoot { display: table-footer-group !important; }
    
    button { padding: 12px 18px; margin: 4px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    #saveBtn { background: #27ae60; color: white; }
    #clearBtn { background: #e67e22; color: white; }
    #soundToggleBtn { background: #3498db; color: white; }
    #stopScanBtn { background: #000000; color: white; }
    #startScanBtn { background: #2ecc71; color: white; display: none; }
    .delete-btn { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 4px; font-size: 14px; border: none; cursor: pointer; }
    #reader { width: 100%; max-width: 350px; margin: 0 auto 20px; }
    #message { margin-top: 12px; font-weight: bold; text-align: center; }
    .success { color: green; }
    .error { color: red; }
    
    #manualAddForm { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin: 10px 0; }
    #manualAddForm input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; flex: 1; min-width: 100px; }
    #manualAddForm button { background: #8e44ad; color: white; flex: 1; min-width: 120px; }
  </style>
</head>
<body>
  <h2>📷 স্মার্ট QR & বারকোড স্ক্যানার</h2>
  <p>JSON, key=value এবং pipe(|) সেপারেটর সঠিকভাবে পার্স করে।</p>
  <div id="reader"></div>
  <div style="text-align:center; margin-top:10px; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
    <button id="startScanBtn">▶️ স্ক্যান করুন</button>
    <button id="stopScanBtn" style="display:none;">🛑 স্ক্যান থামান</button>
    <button id="soundToggleBtn">🔊 স্ক্যান শব্দ: চালু</button>
  </div>

  <div id="manualAddForm">
    <input type="text" id="manualDateTime" placeholder="তারিখ ও সময় (যেমন ১২/৭/২০২৬ ৩:৩০:২৫ PM)">
    <input type="text" id="manualName" placeholder="পণ্যের নাম *">
    <input type="number" id="manualPrice" placeholder="দাম">
    <input type="text" id="manualSku" placeholder="SKU (ঐচ্ছিক)">
    <input type="text" id="manualNote" placeholder="নোট (ঐচ্ছিক)">
    <button id="addManualBtn">➕ ম্যানুয়াল যোগ করুন</button>
  </div>

  <div class="table-wrapper">
    <table id="productTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
      <tfoot id="tableFoot"></tfoot>
    </table>
  </div>

  <div style="text-align:center;">
    <button id="saveBtn">💾 Google Sheet-এ সংরক্ষণ</button>
    <button id="clearBtn">🗑️ সম্পূর্ণ তালিকা মুছুন</button>
  </div>
  <div id="message"></div>

  <script>
    // ⚙️ আপনার নতুন ডিপ্লয় করা Apps Script URL বসান
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwpj7xqG49L-4s3fOaA6tSlJ6CPpmvUxPmLpe8-94BR13Qhg1xi6Qui72-Zi0zLBRDT/exec';

    let productList = []; 
    let lastScannedText = ''; 
    let isSoundOn = true;
    let isProcessing = false;

    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');
    const tableFoot = document.getElementById('tableFoot');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const messageDiv = document.getElementById('message');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const startScanBtn = document.getElementById('startScanBtn');

    soundToggleBtn.addEventListener('click', () => {
      isSoundOn = !isSoundOn;
      soundToggleBtn.textContent = isSoundOn ? '🔊 স্ক্যান শব্দ: চালু' : '🔇 স্ক্যান শব্দ: বন্ধ';
      soundToggleBtn.style.background = isSoundOn ? '#3498db' : '#7f8c8d';
    });

    function playBeep() {
      if (!isSoundOn) return;
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
      } catch(e) {}
    }

    try {
      const saved = localStorage.getItem('productList');
      if (saved) productList = JSON.parse(saved);
      renderTable();
    } catch(e) {}

    // 🔥 ফর্মে তারিখ লিখলে অটোমেটিক সময় বসানোর লজিক
    document.getElementById('manualDateTime').addEventListener('blur', function() {
        let val = this.value.trim();
        if (val) {
            if (!val.includes(':') && !val.includes('AM') && !val.includes('PM')) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('en-GB', { hour12: false });
                this.value = val + ' ' + timeStr;
            }
        }
    });

    // ✅ মূল রেন্ডার ফাংশন (ফুটার নিশ্চিত করা হয়েছে)
    function renderTable() {
      const headers = ['date', 'name', 'price', 'sku', 'note', 'delete'];

      // ১. হেডার
      tableHead.innerHTML = '';
      const headerRow = document.createElement('tr');
      headers.forEach(header => {
        const th = document.createElement('th');
        if(header === 'date') th.textContent = 'তারিখ ও সময়';
        else if(header === 'delete') th.textContent = 'মুছুন';
        else if(header === 'name') th.textContent = 'পণ্যের নাম';
        else if(header === 'price') th.textContent = 'দাম';
        else if(header === 'sku') th.textContent = 'SKU';
        else if(header === 'note') th.textContent = 'নোট';
        headerRow.appendChild(th);
      });
      tableHead.appendChild(headerRow);

      // ২. ডেটা
      tableBody.innerHTML = '';
      let totalPrice = 0;
      productList.forEach((item, index) => {
        const tr = document.createElement('tr');
        headers.forEach(header => {
          const td = document.createElement('td');
          if (header === 'delete') {
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '✕';
            delBtn.onclick = () => {
              if (confirm('আইটেমটি মুছে ফেলবেন?')) {
                productList.splice(index, 1);
                renderTable(); 
              }
            };
            td.appendChild(delBtn);
          } else {
            td.contentEditable = "true";
            let val = item[header] || '';
            if(header === 'price') {
              let numVal = parseFloat(val) || 0;
              totalPrice += numVal;
              td.textContent = val;
              td.addEventListener('input', (e) => {
                let v = parseFloat(e.target.textContent) || 0;
                item[header] = v;
                renderTable(); 
              });
            } else {
              td.textContent = val;
              td.addEventListener('input', (e) => {
                item[header] = e.target.textContent;
                localStorage.setItem('productList', JSON.stringify(productList));
              });
            }
          }
          tr.appendChild(td);
        });
        tableBody.appendChild(tr);
      });

      // ৩. ✅ মোট পণ্য সারি (ফুটার) - এখন CSS ফিক্সের কারণে ১০০% আসবে
      tableFoot.innerHTML = '';
      const footerRow = document.createElement('tr');
      footerRow.className = 'totals';
      
      const savedFooterNote = localStorage.getItem('footerNote') || '';
      footerRow.innerHTML = `
        <td style="font-weight:bold;">মোট পণ্য:</td>
        <td style="font-weight:bold;">${productList.length}</td>
        <td style="font-weight:bold;">${totalPrice > 0 ? totalPrice + ' টাকা' : '0 টাকা'}</td>
        <td></td>
        <td id="totalNoteCell" contenteditable="true" style="font-weight:bold; text-align:center;">${savedFooterNote}</td>
        <td></td>
      `;
      tableFoot.appendChild(footerRow);
      
      const totalNoteCell = document.getElementById('totalNoteCell');
      if (totalNoteCell) {
        totalNoteCell.addEventListener('input', (e) => {
          localStorage.setItem('footerNote', e.target.innerText);
        });
      }
      localStorage.setItem('productList', JSON.stringify(productList));
    }

    // ✅ পার্সিং লজিক
    function processQRData(qrString) {
      if (isProcessing) return;
      const trimmedString = qrString.trim();
      if (lastScannedText === trimmedString) {
        if (!confirm('⚠️ এই পণ্যটি ইতিমধ্যে স্ক্যান করা হয়েছে। কি আরেকটি নতুন কপি হিসেবে যুক্ত করতে চান?')) return; 
      }

      isProcessing = true;
      lastScannedText = trimmedString;
      playBeep();

      const currentDateTime = new Date().toLocaleString('en-GB'); 
      const item = { date: currentDateTime, note: '' }; 
      
      try {
        const jsonData = JSON.parse(trimmedString);
        for (const [key, value] of Object.entries(jsonData)) { item[key] = value; }
        productList.push(item);
        renderTable();
        messageDiv.textContent = `✅ ${item.name || item['পণ্যের নাম'] || 'পণ্য'} স্ক্যান সফল`;
        messageDiv.className = 'success';
        if (navigator.vibrate) navigator.vibrate(200);
        setTimeout(() => { isProcessing = false; }, 500);
        return;
      } catch (e) {}

      const parts = trimmedString.split('|');
      let foundKeysEq = false;
      let tempItem = {};
      parts.forEach(part => {
        if (part.includes('=')) {
          const kv = part.split('=');
          if (kv.length === 2) {
            tempItem[kv[0].trim()] = kv[1].trim();
            foundKeysEq = true;
          }
        }
      });
      if (foundKeysEq) {
        for (const [key, value] of Object.entries(tempItem)) { item[key] = value; }
        productList.push(item);
        renderTable();
        messageDiv.textContent = `✅ ${item.name || item['পণ্যের নাম'] || 'পণ্য'} স্ক্যান সফল`;
        messageDiv.className = 'success';
        if (navigator.vibrate) navigator.vibrate(200);
        setTimeout(() => { isProcessing = false; }, 500);
        return;
      }

      if (parts.length >= 2) {
        let p1 = parts[0].trim(), p2 = parts[1].trim();
        let p1Num = parseFloat(p1);
        let p2Num = parseFloat(p2);
        if (!isNaN(p1Num)) { 
           item['price'] = p1Num;
           item['name'] = p2;
           if(parts.length >= 3) item['sku'] = parts[2].trim();
        } else if (!isNaN(p2Num)) { 
           item['name'] = p1;
           item['price'] = p2Num;
        } else { 
           item['sku'] = p1;
           item['name'] = p2;
           if(parts.length >= 3) item['price'] = parseFloat(parts[2].trim()) || 0;
        }
        productList.push(item);
        renderTable();
        messageDiv.textContent = `✅ ${item.name || item['পণ্যের নাম'] || 'পণ্য'} স্ক্যান সফল`;
        messageDiv.className = 'success';
        if (navigator.vibrate) navigator.vibrate(200);
        setTimeout(() => { isProcessing = false; }, 500);
        return;
      }

      let namePart = trimmedString;
      let detectedPrice = 0;
      const leadingPriceMatch = namePart.match(/^\s*(\d+)\s+(.+)/);
      const trailingPriceMatch = namePart.match(/(.+)\s+(\d+)\s*$/);
      if (leadingPriceMatch && leadingPriceMatch[1]) {
          detectedPrice = parseFloat(leadingPriceMatch[1]);
          namePart = leadingPriceMatch[2].trim();
      } else if (trailingPriceMatch && trailingPriceMatch[2]) {
          detectedPrice = parseFloat(trailingPriceMatch[2]);
          namePart = trailingPriceMatch[1].trim();
      }
      item['name'] = namePart || 'অজানা পণ্য';
      item['price'] = detectedPrice;
      productList.push(item);
      renderTable();
      messageDiv.textContent = `✅ ${item.name} স্ক্যান সফল`;
      messageDiv.className = 'success';
      if (navigator.vibrate) navigator.vibrate(200);
      setTimeout(() => { isProcessing = false; }, 500);
    }

    // ✅ ম্যানুয়ালি পণ্য যোগ করা
    function addManualProduct() {
      let manualDateTime = document.getElementById('manualDateTime').value.trim();
      const manualName = document.getElementById('manualName').value.trim();
      const manualPrice = parseFloat(document.getElementById('manualPrice').value);
      const manualSku = document.getElementById('manualSku').value.trim();
      const manualNote = document.getElementById('manualNote').value.trim();

      if (!manualName) {
        alert('অনুগ্রহ করে পণ্যের নাম লিখুন!');
        return;
      }
      if (!manualDateTime) {
          const now = new Date();
          manualDateTime = now.toLocaleString('en-GB');
      }
      const newItem = {
        date: manualDateTime,
        name: manualName,
        price: isNaN(manualPrice) ? 0 : manualPrice,
        sku: manualSku || '',
        note: manualNote || ''
      };
      productList.push(newItem);
      renderTable();
      messageDiv.textContent = `✅ ম্যানুয়ালি ${newItem.name} যুক্ত করা হয়েছে`;
      messageDiv.className = 'success';
      document.getElementById('manualDateTime').value = '';
      document.getElementById('manualName').value = '';
      document.getElementById('manualPrice').value = '';
      document.getElementById('manualSku').value = '';
      document.getElementById('manualNote').value = '';
    }

    document.getElementById('addManualBtn').addEventListener('click', addManualProduct);

    // স্ক্যানার সেটআপ
    const html5QrCode = new Html5Qrcode("reader");
    const formatsToSupport = [
      Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8, Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E, Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39, Html5QrcodeSupportedFormats.CODABAR,
      Html5QrcodeSupportedFormats.CODE_93, Html5QrcodeSupportedFormats.ITF
    ];
    const config = { fps: 5, qrbox: { width: 300, height: 100 }, formatsToSupport };

    function startScanner() {
      html5QrCode.start({ facingMode: "environment" }, config, 
        decodedText => processQRData(decodedText),
        err => {}
      ).then(() => {
        stopScanBtn.style.display = 'inline-block';
        startScanBtn.style.display = 'none';
      }).catch(err => alert('ক্যামেরা অনুমতি দিন'));
    }

    stopScanBtn.onclick = () => {
      html5QrCode.stop().then(() => {
        stopScanBtn.style.display = 'none';
        startScanBtn.style.display = 'inline-block';
      });
    };
    startScanBtn.onclick = startScanner;
    window.addEventListener('load', startScanner);

    // ✅ Google Sheet-এ সেভ
    saveBtn.addEventListener('click', () => {
      if (productList.length === 0) return alert('তালিকা খালি');
      const footerNote = localStorage.getItem('footerNote') || '';
      const dataToSend = { items: productList, meta: { total_note: footerNote } };
      const formData = new URLSearchParams();
      formData.append('data', JSON.stringify(dataToSend));
      fetch(SCRIPT_URL, {
        method: 'POST',
        body: formData
      })
      .then(response => response.text())
      .then(data => {
        if(data.trim() === "Success") {
           messageDiv.textContent = '✅ Google Sheet-এ জমা হয়েছে (সময় ও নোট-সহ)';
           messageDiv.className = 'success';
           productList = []; 
           localStorage.removeItem('footerNote');
           renderTable();
        } else {
           messageDiv.textContent = '❌ সমস্যা: ' + data;
           messageDiv.className = 'error';
        }
      })
      .catch(err => {
        console.error("Fetch Error:", err);
        messageDiv.textContent = '❌ নেটওয়ার্ক সমস্যা';
        messageDiv.className = 'error';
      });
    });

    clearBtn.onclick = () => {
      if (confirm('সম্পূর্ণ তালিকা মুছবেন?')) {
        productList = []; 
        localStorage.removeItem('footerNote');
        renderTable();
        messageDiv.textContent = '';
      }
    };
  </script>
</body>
</html>
