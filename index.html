<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ডায়নামিক QR ও বারকোড স্ক্যানার</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 15px; max-width: 650px; margin: auto; background: #f5f5f5; }
    h2 { color: #2c3e50; }
    table { border-collapse: collapse; width: 100%; background: white; box-shadow: 0 0 5px rgba(0,0,0,0.1); margin: 15px 0; font-size: 14px; overflow-x: auto; display: block; }
    th { background: #3498db; color: white; padding: 10px 6px; text-align: center; position: sticky; top: 0; }
    td { border: 1px solid #ddd; padding: 8px 6px; text-align: center; }
    .totals td { font-weight: bold; background: #ecf0f1; }
    button { padding: 12px 18px; margin: 4px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
    #saveBtn { background: #27ae60; color: white; }
    #clearBtn { background: #e67e22; color: white; }
    #soundToggleBtn { background: #3498db; color: white; } /* নতুন বাটন */
    .delete-btn { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 4px; font-size: 14px; border: none; }
    #reader { width: 100%; max-width: 350px; margin: 0 auto 20px; }
    #message { margin-top: 12px; font-weight: bold; text-align: center; }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h2>📷 ডায়নামিক QR & বারকোড স্ক্যানার</h2>
  <p>স্ক্যান করা তথ্য অনুযায়ী কলাম ও সারি নিজেই তৈরি হবে।</p>
  <div id="reader"></div>
  <div style="text-align:center; margin-top:10px;">
    <button id="stopScanBtn" style="display:none;">🛑 স্ক্যান থামান</button>
    <button id="soundToggleBtn">🔊 স্ক্যান শব্দ: চালু</button>
  </div>

  <div style="overflow-x:auto;">
    <table id="productTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
      <tfoot id="tableFoot"></tfoot>
    </table>
  </div>

  <div style="text-align:center;">
    <button id="saveBtn">💾 Google Sheet-এ সংরক্ষণ</button>
    <button id="clearBtn">🗑️ সম্পূর্ণ তালিকা মুছুন</button>
  </div>
  <div id="message"></div>

  <script>
    // ⚙️ আপনার Google Apps Script ওয়েব অ্যাপ URL বসান
    const SCRIPT_URL = 'https://script.google.com/macros/s/XXXXX/exec'; 

    let productList = []; 
    let lastScannedText = ''; // ডুপ্লিকেট স্ক্যান আটকানোর ভেরিয়েবল
    let isProcessing = false; // ব্লক করা হচ্ছে কিনা
    let isSoundOn = true; // শব্দ চালু আছে কিনা

    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');
    const tableFoot = document.getElementById('tableFoot');
    const saveBtn = document.getElementById('saveBtn');
    const clearBtn = document.getElementById('clearBtn');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const messageDiv = document.getElementById('message');
    const stopScanBtn = document.getElementById('stopScanBtn');

    // 🔥 শব্দ চালু/বন্ধ করার বাটন ইভেন্ট
    soundToggleBtn.addEventListener('click', () => {
      isSoundOn = !isSoundOn;
      soundToggleBtn.textContent = isSoundOn ? '🔊 স্ক্যান শব্দ: চালু' : '🔇 স্ক্যান শব্দ: বন্ধ';
      soundToggleBtn.style.background = isSoundOn ? '#3498db' : '#7f8c8d';
    });

    // 🔥 বিপ শব্দ তৈরি ফাংশন
    function playBeep() {
      if (!isSoundOn) return;
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
      } catch(e) { /* শব্দ তৈরি না হলে ইগনোর */ }
    }

    try {
      const saved = localStorage.getItem('productList');
      if (saved) productList = JSON.parse(saved);
      renderTable();
    } catch(e) {}

    // ✅ টেবিল রেন্ডার (ফুটার সারিবদ্ধ করা)
    function renderTable() {
      const allKeys = new Set();
      productList.forEach(item => {
        Object.keys(item).forEach(key => allKeys.add(key));
      });
      
      const defaultHeaders = ['date'];
      const finalHeaders = Array.from(allKeys).filter(k => !defaultHeaders.includes(k));
      const headers = [...defaultHeaders, ...finalHeaders, 'delete'];

      // হেডার
      tableHead.innerHTML = '';
      const headerRow = document.createElement('tr');
      headers.forEach(header => {
        const th = document.createElement('th');
        if(header === 'date') th.textContent = 'তারিখ';
        else if(header === 'delete') th.textContent = 'মুছুন';
        else th.textContent = header;
        headerRow.appendChild(th);
      });
      tableHead.appendChild(headerRow);

      // বডি
      tableBody.innerHTML = '';
      let totalItems = 0;
      let totalPrice = 0;

      productList.forEach((item, index) => {
        const tr = document.createElement('tr');
        headers.forEach(header => {
          const td = document.createElement('td');
          if (header === 'delete') {
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '✕';
            delBtn.onclick = () => {
              if (confirm('আইটেমটি মুছে ফেলবেন?')) {
                productList.splice(index, 1);
                renderTable();
              }
            };
            td.appendChild(delBtn);
          } else {
            let val = item[header] || '';
            if (header === 'দাম' || header === 'price') {
              let priceNum = parseFloat(val) || 0;
              totalPrice += priceNum;
              val = priceNum > 0 ? priceNum + ' টাকা' : '0';
            }
            td.textContent = val;
            if(header === 'পণ্যের নাম') totalItems++;
          }
          tr.appendChild(td);
        });
        tableBody.appendChild(tr);
      });

      // 🔥 ফুটার (পরিমাণ ও দাম কলামের নিচে মোট বসানো)
      tableFoot.innerHTML = '';
      const footerRow = document.createElement('tr');
      footerRow.className = 'totals';
      footerRow.innerHTML = `
        <td colspan="2" style="text-align:right; font-weight:bold;">মোট পণ্য:</td>
        <td style="font-weight:bold;">${totalItems}</td>
        <td style="font-weight:bold;">${totalPrice} টাকা</td>
        <td></td>
      `;
      tableFoot.appendChild(footerRow);
      
      localStorage.setItem('productList', JSON.stringify(productList));
    }

    // ✅ উন্নত স্ক্যান লজিক (একবার স্ক্যান + অটোমেটিক দাম বের করা)
    function processQRData(qrString) {
      const trimmedString = qrString.trim();

      // 🔥 ডুপ্লিকেট স্ক্যান আটকানো (একই QR ক্যামেরায় ধরে রাখলে আর স্ক্যান করবে না)
      if (lastScannedText === trimmedString || isProcessing) {
        return; 
      }
      isProcessing = true;
      lastScannedText = trimmedString;

      // শব্দ বাজানো
      playBeep();

      const today = new Date().toLocaleDateString('bn-BD', { year: 'numeric', month: '2-digit', day: '2-digit' });
      const item = { date: today };
      
      // ১. ডেটা পার্স করা
      const parts = trimmedString.split('|');
      let foundKeys = false;
      
      parts.forEach(part => {
        if (part.includes('=')) {
          const kv = part.split('=');
          if (kv.length === 2) {
            item[kv[0].trim()] = kv[1].trim();
            foundKeys = true;
          }
        }
      });

      // ২. যদি সাধারণ টেক্সট হয়, তবে দাম বের করার লজিক
      if (!foundKeys) {
        let namePart = trimmedString;
        let detectedPrice = 0;
        
        // টেক্সটের ভেতরে "দাম" বা "Price" খোঁজা (যেমন: বাংলা বই দাম ১৫০ টাকা)
        const priceMatch = namePart.match(/(?:দাম|price)\s*(\d+)/i);
        if (priceMatch && priceMatch[1]) {
          detectedPrice = parseFloat(priceMatch[1]);
          namePart = namePart.replace(/(?:দাম|price)\s*\d+\s*(?:টাকা)?/i, '').trim();
        }
        
        item['পণ্যের নাম'] = namePart;
        item['পরিমাণ'] = '১ টি';
        item['দাম'] = detectedPrice;
      }

      productList.push(item);
      renderTable();
      messageDiv.textContent = `✅ ${item['পণ্যের নাম'] || item.name || 'পণ্য'} স্ক্যান সফল`;
      messageDiv.className = 'success';
      if (navigator.vibrate) navigator.vibrate(200);

      // 🔥 ১.৫ সেকেন্ড পর লক খোলা (যাতে ভিন্ন পণ্য দ্রুত স্ক্যান করা যায়)
      setTimeout(() => {
        isProcessing = false;
      }, 1500);
    }

    // ক্যামেরা ও বারকোড কনফিগার
    const html5QrCode = new Html5Qrcode("reader");
    const formatsToSupport = [
      Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8, Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.CODE_128
    ];
    const config = { fps: 10, qrbox: { width: 250, height: 250 }, formatsToSupport };

    html5QrCode.start({ facingMode: "environment" }, config, 
      decodedText => processQRData(decodedText),
      err => {}
    ).then(() => stopScanBtn.style.display = 'inline-block')
     .catch(err => alert('ক্যামেরা অনুমতি দিন'));

    stopScanBtn.onclick = () => {
      html5QrCode.stop().then(() => stopScanBtn.style.display = 'none');
    };

    // Google Sheet-এ সেভ
    saveBtn.addEventListener('click', () => {
      if (productList.length === 0) return alert('তালিকা খালি');
      fetch(SCRIPT_URL, {
        method: 'POST', body: JSON.stringify(productList),
        headers: { 'Content-Type': 'application/json' }
      }).then(() => {
        messageDiv.textContent = '✅ Google Sheet-এ জমা হয়েছে';
        productList = []; renderTable();
      }).catch(() => {
        messageDiv.textContent = '❌ নেটওয়ার্ক সমস্যা';
      });
    });

    clearBtn.onclick = () => {
      if (confirm('সম্পূর্ণ তালিকা মুছবেন?')) {
        productList = []; renderTable();
        messageDiv.textContent = '';
      }
    };
  </script>
</body>
</html>
